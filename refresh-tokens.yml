name: Scheduled Token Refresh

on:
  schedule:
    - cron: '11 10,16,22 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Fetch Fresh Tokens and Update index.html
        run: node scraper.js

      - name: Read myCameraTooltip source
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const b = await puppeteer.launch({headless:true, args:['--no-sandbox']});
            const p = await b.newPage();
            const r = await p.evaluate(async () => {
              const res = await fetch('https://www.drivenc.gov/Scripts/map/LayerSpecific/myCameraTooltip.min.js?v=26.5.27');
              return res.text();
            });
            console.log(r);
            await b.close();
          })();
          "

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: |
            debug.png
            debug-before-click.png

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff-index --quiet HEAD || git commit -m "Automated Token Update [skip ci]"
          git push
