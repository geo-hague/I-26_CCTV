name: Scheduled Token Refresh

on:
  schedule:
    - cron: '11 10,16,22 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Initialize and Install Dependencies
        run: |
          npm init -y
          npm install puppeteer

      - name: Execute Scraper Engine
        run: node scraper.js

      - name: Commit and Push Updated Configuration
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff-index --quiet HEAD || git commit -m "Automated Token Update [skip ci]"
          git push