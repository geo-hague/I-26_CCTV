name: Scheduled Token Refresh

on:
  schedule:
    - cron: '11 10,16,22 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Fetch Fresh Tokens and Update index.html
        run: node scraper.js

      - name: Read myCameraTooltip source
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            try {
              const b = await puppeteer.launch({
                headless: true, 
                args: ['--no-sandbox', '--disable-setuid-sandbox']
              });
              const p = await b.newPage();
              
              // Catch console logs/errors from inside the page
              p.on('pageerror', err => console.error('Page error:', err));
              
              const r = await p.evaluate(async () => {
                try {
                  const res = await fetch('https://www.drivenc.gov/Scripts/map/LayerSpecific/myCameraTooltip.min.js?v=26.5.27');
                  if (!res.ok) return 'HTTP Error: ' + res.status;
                  return await res.text();
                } catch (e) {
                  return 'Fetch failed inside browser: ' + e.message;
                }
              });
              
              console.log('--- FETCH RESULT START ---');
              console.log(r);
              console.log('--- FETCH RESULT END ---');
              
              await b.close();
            } catch (globalError) {
              console.error('Puppeteer Script Error:', globalError.message);
              process.exit(1);
            }
          })();
          "

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: |
            debug.png
            debug-before-click.png

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff-index --quiet HEAD || git commit -m "Automated Token Update [skip ci]"
          git push
