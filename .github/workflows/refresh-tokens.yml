name: Scheduled Token Refresh

on:
  schedule:
    - cron: '37 10,16 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # Explicitly install puppeteer dependencies required for headless Linux environments
      - name: Install Dependencies
        run: |
          npm install puppeteer

      # Run your precise paginated list-based scraper script
      - name: Fetch Fresh Tokens and Update index.html
        run: node scraper.js

      # Keep this step active to archive any local debugging captures if the script misbehaves
      - name: Upload Debug Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: |
            *.png
          if-no-files-found: ignore

      # Securely commit modifications back to your main repository workspace
      - name: Commit and Push Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Only stage and commit if index.html actually changed
          git add index.html
          if ! git diff-index --quiet HEAD; then
            git commit -m "Automated Token Update [skip ci]"
            git push
          else
            echo "No token modifications detected. Workspace clear."
          fi