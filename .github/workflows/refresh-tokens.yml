name: Scheduled Token Refresh

on:
  schedule:
    # Runs every 6 hours automatically (At minute 0 of hours 0, 6, 12, 18)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows you to trigger this manually from the GitHub UI Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-node-version: '20'

      - name: Install Puppeteer Chromium Dependencies
        run: |
          npm init -y
          npm install puppeteer

      - name: Execute Scraper Engine
        run: node scraper.js

      - name: Commit and Push Updated Configuration
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff-index --quiet HEAD || git commit -m "Automated Token Update [skip ci]"
          git push