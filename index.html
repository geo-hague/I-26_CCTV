<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I-26 CCTV</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.8/hls.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden; font-family: sans-serif;
        }
        .video-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            width: 100%; height: 100%; gap: 2px;
        }
        .video-wrapper { position: relative; width: 100%; height: 100%; background: #111; }
        video { width: 100%; height: 100%; object-fit: contain; display: block; }
        .nav-btn {
            position: fixed; top: 50%; transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.6); color: #fff; border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 20px 15px; font-size: 24px; cursor: pointer; z-index: 10;
            transition: background 0.2s, opacity 0.2s; user-select: none; border-radius: 4px;
        }
        .nav-btn:hover { background: rgba(255, 255, 255, 0.2); }
        .nav-btn.hidden { display: none; }
        #prev-btn { left: 10px; }
        #next-btn { right: 10px; }
    </style>
</head>
<body>

    <button id="prev-btn" class="nav-btn hidden">&larr; West</button>
    <button id="next-btn" class="nav-btn hidden">East &rarr;</button>

    <div id="grid" class="video-grid"></div>

    <script>
        // --- START TOKENS ---
        const tokenConfig = {
  "token": "6288a1a68f2538afa944c55613ccb099ec8c1ac182a98d16ca7727c07dbca197",
  "updated": "Initial Setup"
};
        // --- END TOKENS ---

        // Configured channels with their respective subdomains
        const cameraChannels = [
            // Page 1
            { host: "cfase02", chan: "chan-5373_l" },
            { host: "cfase03", chan: "chan-5374_l" },
            { host: "cfase04", chan: "chan-5375_l" },
            { host: "cfsse11", chan: "chan-5376_l" },
            { host: "cfase01", chan: "chan-5378_l" },
            { host: "cfase02", chan: "chan-6332_l" },
            { host: "cfase04", chan: "chan-5381_l" },
            { host: "cfase04", chan: "chan-5432_l" },
            
            // Page 2
            { host: "cfase03", chan: "chan-5440_l" },
            { host: "cfsse13", chan: "chan-5441_l" },
            { host: "cfase03", chan: "chan-6279_l" },
            { host: "cfsse02", chan: "chan-5442_l" },   
            { host: "cfase02", chan: "chan-5443_l" },
            { host: "cfase01", chan: "chan-6275_l" },
            { host: "cfase03", chan: "chan-6276_l" },
            { host: "cfsse05", chan: "chan-6327_l" },
            
            // Page 3
            // MM 55.5 Green River Bridge
			{ host: "cfsse05", chan: "chan-6328_l" },
			// Future MM 60
			// Future MM 62?
			// Future MM 63.5
            { host: "cfsse03", chan: "chan-5444_l" },
            { host: "cfase03", chan: "chan-5446_l" },
			// Future MM 66
            { host: "cfase05", chan: "chan-5445_l" }
        ];

        // Map configuration data to active target URLs dynamically
        const cameraSources = cameraChannels.map(cam => 
            `https://${cam.host}.services.ncdot.gov:8887/${cam.chan}/index.m3u8?token=${tokenConfig.token}`
        );

        const CAMS_PER_PAGE = 8;
        let currentPage = 0;
        let activeHlsInstances = [];

        const gridEl = document.getElementById('grid');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        function destroyCurrentStreams() {
            activeHlsInstances.forEach(hls => { hls.detachMedia(); hls.destroy(); });
            activeHlsInstances = [];
            gridEl.querySelectorAll('video').forEach(video => {
                video.pause(); video.src = ""; video.load();
            });
            gridEl.innerHTML = '';
        }

        function loadPage(pageNumber) {
            destroyCurrentStreams();
            const startIndex = pageNumber * CAMS_PER_PAGE;
            const endIndex = Math.min(startIndex + CAMS_PER_PAGE, cameraSources.length);
            const pageStreams = cameraSources.slice(startIndex, endIndex);

            pageStreams.forEach(source => {
                const wrapper = document.createElement('div');
                wrapper.className = 'video-wrapper';
                const video = document.createElement('video');
                video.controls = true; video.autoplay = true; video.muted = true;
                video.setAttribute('playsinline', 'true');

                wrapper.appendChild(video);
                gridEl.appendChild(wrapper);

                if (typeof Hls !== 'undefined' && Hls.isSupported()) {
                    const hls = new Hls({ maxBufferLength: 10 });
                    hls.loadSource(source); hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        video.play().catch(err => console.log("Autoplay blocked:", err));
                    });
                    activeHlsInstances.push(hls);
                } 
                else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = source;
                    video.addEventListener('loadedmetadata', () => {
                        video.play().catch(err => console.log("Autoplay blocked:", err));
                    });
                }
            });
            updateNavButtons();
        }

        function updateNavButtons() {
            const totalPages = Math.ceil(cameraSources.length / CAMS_PER_PAGE);
            currentPage > 0 ? prevBtn.classList.remove('hidden') : prevBtn.classList.add('hidden');
            currentPage < totalPages - 1 ? nextBtn.classList.remove('hidden') : nextBtn.classList.add('hidden');
        }

        prevBtn.addEventListener('click', () => { if (currentPage > 0) { currentPage--; loadPage(currentPage); } });
        nextBtn.addEventListener('click', () => {
            const totalPages = Math.ceil(cameraSources.length / CAMS_PER_PAGE);
            if (currentPage < totalPages - 1) { currentPage++; loadPage(currentPage); }
        });

        document.addEventListener("DOMContentLoaded", () => loadPage(currentPage));
    </script>
</body>
</html>
