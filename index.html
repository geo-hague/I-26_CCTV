<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I-26 CCTV</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.8/hls.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0; padding: 0; width: 100%; min-height: 100%;
            background-color: #000; font-family: sans-serif;
            overflow-x: hidden; overflow-y: auto;
        }
        
        .video-grid {
            display: grid;
            width: 100%;
            min-height: 100vh;
            gap: 4px;
            padding: 4px;
        }

        /* --- UPDATED RESPONSIVE BREAKPOINTS --- */

        @media (min-width: 2000px) {
            /* Ultra-wide displays: 6 columns */
            .video-grid { grid-template-columns: repeat(6, 1fr); }
        }

        @media (min-width: 1900px) and (max-width: 1999px) {
            /* 1440p Monitors (scaled) & High-Res: 5 columns */
            .video-grid { grid-template-columns: repeat(5, 1fr); }
        }

        @media (min-width: 992px) and (max-width: 1899px) {
            /* 1080p Monitors (1920px wide) are now explicitly locked here: 4 columns */
            .video-grid { grid-template-columns: repeat(4, 1fr); }
        }

        @media (min-width: 576px) and (max-width: 991px) {
            /* Tablets / Horizontal Mobile: 2 columns */
            .video-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 575px) {
            /* Mobile Devices: 1 column vertical stack */
            .video-grid { grid-template-columns: 1fr; }
        }

        .video-wrapper { 
            position: relative; 
            width: 100%; 
            background: #111; 
            aspect-ratio: 16 / 9; 
            overflow: hidden;
            border-radius: 2px;
        }
        
        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block; 
        }
        
        .nav-btn {
            position: fixed; top: 50%; transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.75); color: #fff; border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 18px 14px; font-size: 22px; cursor: pointer; z-index: 10;
            transition: background 0.2s, opacity 0.2s; user-select: none; border-radius: 6px;
        }
        .nav-btn:hover { background: rgba(255, 255, 255, 0.25); }
        .nav-btn.hidden { display: none; }
        #prev-btn { left: 8px; }
        #next-btn { right: 8px; }

        @media (max-width: 767px) {
            .nav-btn {
                padding: 12px 10px;
                font-size: 16px;
                background: rgba(0, 0, 0, 0.85);
            }
        }
    </style>
</head>
<body>
    <button id="prev-btn" class="nav-btn hidden">&larr; West</button>
    <button id="next-btn" class="nav-btn hidden">East &rarr;</button>
    <div id="grid" class="video-grid"></div>

    <script>
        // --- START TOKENS ---
        const tokenConfig = {
  "chan-5373_l": "6c5b4f8a-9b6a-4ff1-a6a6-df746cc199c1",
  "chan-5374_l": "0869eaae-f054-4ce3-afaa-27dd487a48e5",
  "chan-5375_l": "d129bcdc-152d-49c8-899b-a872cd51b211",
  "chan-5376_l": "671f56ab-216f-45af-b63d-736648a22218",
  "chan-5378_l": "c55039e8-2241-4f95-b1be-bb5e3cf8e255",
  "chan-6332_l": "26bb65db-ea33-4f49-838c-552141b61d6d",
  "chan-5381_l": "aa8e1f51-c675-4ff6-9972-b2d70417ed7a",
  "chan-5432_l": "9ec66cf2-798e-4f78-a951-d91ee62c850e",
  "chan-5440_l": "146acaf5-309e-4a12-a0ed-557e89a60a4c",
  "chan-5441_l": "c6a301e9-b677-4d4f-846b-8276fa7a7aaa",
  "chan-6279_l": "0f066e55-9eab-42c0-ab3b-37b1dcc89ffd",
  "chan-5442_l": "f24a3470-48e3-46cb-a9be-b9f988d5f45d",
  "chan-5443_l": "9f147632-50d0-49e2-bb32-3a70de22604c",
  "chan-6275_l": "000531ae-5662-4c95-8457-71e68ab4a984",
  "chan-6276_l": "74db05c3-958e-4b38-9cbe-9e3d5efdf510",
  "chan-6327_l": "d27517b8-ea08-484b-9545-0acb45174d6a",
  "chan-6328_l": "b76c366a-3b05-4049-8d6a-a5b00d4ce446",
  "chan-5444_l": "b1d3779e-afca-445d-97a8-6449d6717016",
  "chan-5446_l": "af6dccbf-bd1b-478e-9d02-5ad4a6d06089",
  "chan-5445_l": "7c773bdf-6c66-4fc1-b245-06909dfde12d",
  "updated": "Initial Setup"
};
        // --- END TOKENS ---

        const cameraChannels = [
            // Page 1
            { host: "cfase02", chan: "chan-5373_l" },
            { host: "cfase03", chan: "chan-5374_l" },
            { host: "cfase04", chan: "chan-5375_l" },
            { host: "cfsse11", chan: "chan-5376_l" },
            { host: "cfase01", chan: "chan-5378_l" },
            { host: "cfase02", chan: "chan-6332_l" },
            { host: "cfase04", chan: "chan-5381_l" },
            { host: "cfase04", chan: "chan-5432_l" },
            // Page 2
            { host: "cfase03", chan: "chan-5440_l" },
            { host: "cfsse13", chan: "chan-5441_l" },
            { host: "cfase03", chan: "chan-6279_l" },
            { host: "cfsse02", chan: "chan-5442_l" },
            { host: "cfase02", chan: "chan-5443_l" },
            { host: "cfase01", chan: "chan-6275_l" },
            { host: "cfase03", chan: "chan-6276_l" },
            { host: "cfsse05", chan: "chan-6327_l" },
            // Page 3
            { host: "cfsse05", chan: "chan-6328_l" },
            { host: "cfsse03", chan: "chan-5444_l" },
            { host: "cfase03", chan: "chan-5446_l" },
            { host: "cfase05", chan: "chan-5445_l" },
        ];

        const cameraSources = cameraChannels.map(cam =>
            `https://${cam.host}.services.ncdot.gov:8887/${cam.chan}/index.m3u8?token=${tokenConfig[cam.chan]}`
        );

        // Dynamically throttle active streams to prevent crashing phone browser engines
        const isMobile = window.innerWidth < 768;
        const CAMS_PER_PAGE = isMobile ? 4 : 10; 
        
        let currentPage = 0;
        let activeHlsInstances = [];

        const gridEl  = document.getElementById('grid');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        function destroyCurrentStreams() {
            activeHlsInstances.forEach(hls => { hls.detachMedia(); hls.destroy(); });
            activeHlsInstances = [];
            gridEl.querySelectorAll('video').forEach(v => { v.pause(); v.src = ""; v.load(); });
            gridEl.innerHTML = '';
        }

        function loadPage(pageNumber) {
            destroyCurrentStreams();
            
            // Return viewport screen to top when turning pages
            window.scrollTo({ top: 0, behavior: 'instant' });

            const start = pageNumber * CAMS_PER_PAGE;
            const pageStreams = cameraSources.slice(start, start + CAMS_PER_PAGE);

            pageStreams.forEach(source => {
                const wrapper = document.createElement('div');
                wrapper.className = 'video-wrapper';
                const video = document.createElement('video');
                
                video.muted = true;
                video.autoplay = true;
                video.controls = true;
                video.setAttribute('playsinline', 'true');
                video.setAttribute('webkit-playsinline', 'true');
                
                wrapper.appendChild(video);
                gridEl.appendChild(wrapper);

                if (typeof Hls !== 'undefined' && Hls.isSupported()) {
                    const hls = new Hls({ maxBufferLength: 6, lowLatencyMode: true });
                    hls.loadSource(source);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        video.play().catch(err => console.log("Autoplay blocked:", err));
                    });
                    activeHlsInstances.push(hls);
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    // Direct stream routing loop fallback for native Safari mobile views
                    video.src = source;
                    video.addEventListener('loadedmetadata', () => {
                        video.play().catch(err => console.log("Autoplay blocked:", err));
                    });
                }
            });
            updateNavButtons();
        }

        function updateNavButtons() {
            const totalPages = Math.ceil(cameraSources.length / CAMS_PER_PAGE);
            currentPage > 0 ? prevBtn.classList.remove('hidden') : prevBtn.classList.add('hidden');
            currentPage < totalPages - 1 ? nextBtn.classList.remove('hidden') : nextBtn.classList.add('hidden');
        }

        prevBtn.addEventListener('click', () => { if (currentPage > 0) { currentPage--; loadPage(currentPage); } });
        nextBtn.addEventListener('click', () => {
            if (currentPage < Math.ceil(cameraSources.length / CAMS_PER_PAGE) - 1) { currentPage++; loadPage(currentPage); }
        });

        document.addEventListener("DOMContentLoaded", () => loadPage(currentPage));
    </script>
</body>
</html>
