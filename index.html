    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; font-family: sans-serif;
            overflow: hidden; /* Prevents all accidental scrolling */
        }
        
        .video-grid {
            display: grid;
            width: 100%;
            height: 100vh;
            gap: 6px; 
            padding: 6px;
        }

        /* --- HARD-LOCKED VIEWPORT GRID MATCHING --- */

        /* Desktop Layout -> 3x3 Grid forced to fit screen height */
        @media (min-width: 768px) {
            .video-grid { 
                grid-template-columns: repeat(3, 1fr); 
                grid-template-rows: repeat(3, 1fr); 
            }
        }

        /* Mobile Layout -> 3 Rows vertical stack forced to fit screen height */
        @media (max-width: 767px) {
            .video-grid { 
                grid-template-columns: 1fr; 
                grid-template-rows: repeat(3, 1fr); 
            }
        }

        .video-wrapper { 
            position: relative; 
            width: 100%; 
            height: 100%; /* Spans exactly to fill its grid track fraction */
            background: #111; 
            overflow: hidden;
            border-radius: 4px;
        }
        
        video { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; /* Keeps 16:9 ratio clean with pillarboxes if ratios conflict */
            display: block; 
        }
        
        /* Low-Profile Navigation Buttons */
        .nav-btn {
            position: fixed; 
            top: 50%; 
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.4); 
            color: rgba(255, 255, 255, 0.7); 
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 20px 10px; 
            font-size: 20px; 
            cursor: pointer; 
            z-index: 10;
            transition: background 0.2s, color 0.2s, border-color 0.2s; 
            user-select: none; 
            border-radius: 4px;
        }
        
        .nav-btn:hover { 
            background: rgba(0, 0, 0, 0.8); 
            color: #fff;
            border-color: rgba(255, 255, 255, 0.5);
        }
        
        .nav-btn.hidden { display: none; }
        #prev-btn { left: 2px; }  
        #next-btn { right: 2px; }

        @media (max-width: 767px) {
            .nav-btn {
                padding: 14px 8px;
                font-size: 15px;
                background: rgba(0, 0, 0, 0.3);
                color: rgba(255, 255, 255, 0.6);
            }
        }
    </style>
</head>

            `https://${cam.host}.services.ncdot.gov:8887/${cam.chan}/index.m3u8?token=${tokenConfig[cam.chan]}`
        );

        const isMobile = window.innerWidth < 768;
        const CAMS_PER_PAGE = isMobile ? 3 : 9; 
        
        let currentPage = 0;
        let activeHlsInstances = [];

        const gridEl  = document.getElementById('grid');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        function destroyCurrentStreams() {
            activeHlsInstances.forEach(hls => { hls.detachMedia(); hls.destroy(); });
            activeHlsInstances = [];
            gridEl.querySelectorAll('video').forEach(v => { v.pause(); v.src = ""; v.load(); });
            gridEl.innerHTML = '';
        }

        function loadPage(pageNumber) {
            destroyCurrentStreams();

            const start = pageNumber * CAMS_PER_PAGE;
            const pageStreams = cameraSources.slice(start, start + CAMS_PER_PAGE);

            pageStreams.forEach(source => {
                const wrapper = document.createElement('div');
                wrapper.className = 'video-wrapper';
                const video = document.createElement('video');
                
                video.muted = true;
                video.autoplay = true;
                video.controls = true;
                video.setAttribute('playsinline', 'true');
                video.setAttribute('webkit-playsinline', 'true');
                
                wrapper.appendChild(video);
                gridEl.appendChild(wrapper);

                if (typeof Hls !== 'undefined' && Hls.isSupported()) {
                    const hls = new Hls({ maxBufferLength: 6, lowLatencyMode: true });
                    hls.loadSource(source);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        video.play().catch(err => console.log("Autoplay blocked:", err));
                    });
                    activeHlsInstances.push(hls);
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = source;
                    video.addEventListener('loadedmetadata', () => {
                        video.play().catch(err => console.log("Autoplay blocked:", err));
                    });
                }
            });
            updateNavButtons();
        }

        function updateNavButtons() {
            const totalPages = Math.ceil(cameraSources.length / CAMS_PER_PAGE);
            currentPage > 0 ? prevBtn.classList.remove('hidden') : prevBtn.classList.add('hidden');
            currentPage < totalPages - 1 ? nextBtn.classList.remove('hidden') : nextBtn.classList.add('hidden');
        }

        prevBtn.addEventListener('click', () => { if (currentPage > 0) { currentPage--; loadPage(currentPage); } });
        nextBtn.addEventListener('click', () => {
            if (currentPage < Math.ceil(cameraSources.length / CAMS_PER_PAGE) - 1) { currentPage++; loadPage(currentPage); }
        });

        document.addEventListener("DOMContentLoaded", () => loadPage(currentPage));
    </script>
